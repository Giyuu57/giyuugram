name: giyuugram
description: Instagram clone built with Flutter & Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # State Management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Routing
  go_router: ^14.2.0

  # Models / Codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Media
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  video_player: ^2.9.1
  chewie: ^1.8.5
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.0
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.4

  # UI / UX
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  visibility_detector: ^0.4.0+2
  pull_to_refresh: ^2.0.0
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.4.2
  logger: ^2.4.0
  connectivity_plus: ^6.0.5
  crypto: ^3.0.5

  # Auth (Google only — Web + Android, no Apple / no iOS)
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
